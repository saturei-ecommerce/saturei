# ===== Application (all envs) =====
spring.application.name=saturei-backend

# ===== Database — PostgreSQL =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== HikariCP (connection pool) =====
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=SatureiHikariPool

# ===== JPA / Hibernate =====
# ddl-auto=validate: Flyway is responsible for schema creation/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.encoding=UTF-8
spring.flyway.table=flyway_schema_history

# ===== Server =====
server.port=${SERVER_PORT:8080}

# ===== Logging =====
logging.level.com.saturei=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
