# ===== Dev profile — local development only =====
# Activate with: SPRING_PROFILES_ACTIVE=dev  or  -Dspring.profiles.active=dev

# ===== Database — local PostgreSQL =====
DB_URL=jdbc:postgresql://localhost:5432/saturei
DB_USERNAME=postgres
DB_PASSWORD=postgres

# ===== JPA / Hibernate =====
# none: Flyway controls the schema; set to create-drop only if you need a quick scratch env
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Logging =====
LOG_LEVEL=DEBUG
LOG_LEVEL_SECURITY=DEBUG
