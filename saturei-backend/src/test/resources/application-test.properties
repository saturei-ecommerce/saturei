# ===== Test profile — used by @DataJpaTest and @SpringBootTest =====
# H2 in-memory database replaces PostgreSQL in unit/integration tests

spring.datasource.url=jdbc:h2:mem:saturei_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create the schema from entities (Flyway is disabled in tests)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
